name: Python CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Type checking with Mypy (Linux)
      if: runner.os == 'Linux'
      run: |
        mypy ghostpurge/cleaners ghostpurge/watchers ghostpurge/main.py ghostpurge/config.py ghostpurge/utils.py
        
    - name: Type checking with Mypy (Windows)
      if: runner.os == 'Windows'
      run: |
        mypy ghostpurge/windows ghostpurge/cleaners ghostpurge/watchers ghostpurge/main_windows.py ghostpurge/config.py ghostpurge/utils.py
        
    - name: Complexity check with Xenon
      run: |
        xenon --max-absolute B --max-modules B --max-average A ghostpurge
        
    - name: Test with pytest (Linux)
      if: runner.os == 'Linux'
      run: |
        pytest tests/
        
    - name: Test with pytest (Windows)
      if: runner.os == 'Windows'
      run: |
        pytest tests_windows/
